<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uberry Cake Shop Contact Us</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="fade-in-page">
    <div class="bg-wrapper"><div class="glow-orb orb-1"></div><div class="glow-orb orb-2"></div><div class="glow-orb orb-3"></div><div class="bg-grid-overlay"></div></div>

    <header class="navbar">
        <div class="logo">Uberry <span>Cake</span></div>
        <nav class="nav-links">
            <a href="index.html" class="nav-item">Home</a>
            <a href="service.html" class="nav-item">Services</a>
            <a href="products.html" class="nav-item">Products</a>
            <a href="contact.html" class="nav-item active">Contact Us</a>
        </nav>
        <button class="nav-btn-me">Me</button>
    </header>

    <main class="page-container">
        <section id="contact" class="page-content-wrapper">
            <div class="inner-page-content">
                <h1 class="page-title">Contact <span>Us</span></h1>
                
                
                
                <div class="contact-info-bento">
                    <div class="info-row">
                        <div class="info-icon-wrapper">📞</div>
                        <div class="info-text-block">
                            <span class="info-label">Hotline</span>
                            <a href="tel:0711518220" class="info-value">0711518220</a>
                        </div>
                    </div>
                    <div class="info-divider"></div>
                    <div class="info-row">
                        <div class="info-icon-wrapper">💬</div>
                        <div class="info-text-block">
                            <span class="info-label">WhatsApp</span>
                            <a href="tel:0754329958" class="info-value">0754329958</a>
                        </div>
                    </div>
                </div>

                <form class="contact-form" onsubmit="event.preventDefault();">
                    <input type="text" placeholder="Your Name" required>
                    <input type="email" placeholder="Email Address" required>
                    <textarea placeholder="Tell us" rows="5" required></textarea>
                    <button type="submit" class="magnetic-btn"><span class="btn-text">Send Message</span></button>
                </form>
            </div>
        </section>
    </main>

    <footer><p>&copy;  <span>Uberry Fancy Cake</span>  Shop.</p></footer>
    <script src="script.js"></script>
</body>
</html>
